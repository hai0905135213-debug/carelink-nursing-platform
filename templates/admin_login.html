<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员入口</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 20% 20%, #1d2b64, #121826 60%); color: #e8eefb; }
    .shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .panel { width: 100%; max-width: 460px; border: 1px solid #2b3a67; background: rgba(9,14,28,0.88); border-radius: 16px; padding: 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.35); }
    .title { font-size: 1.35rem; font-weight: 700; margin-bottom: 8px; }
    .muted { color: #9ab0de; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="title">管理员入口</div>
      <div class="muted mb-3">请输入管理员密钥后进入调研后台。</div>
      {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for c,m in msgs %}
      <div class="alert alert-{{ c }} py-2">{{ m }}</div>
      {% endfor %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">管理员密钥</label>
          <input class="form-control" type="password" name="admin_key" placeholder="请输入密钥" required>
        </div>
        <button class="btn btn-warning w-100">进入后台</button>
      </form>
      <div class="mt-3 text-end"><a class="btn btn-sm btn-outline-light" href="{{ url_for('index') }}">返回平台</a></div>
    </div>
  </div>
</body>
</html>
