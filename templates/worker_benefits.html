{% extends "base.html" %}

{% block content %}
<style>
  body {
      background-color: #f5f6f8;
      padding-top: 50px;
      padding-bottom: 80px;
  }
  main.container {
      padding-left: 0 !important;
      padding-right: 0 !important;
      max-width: 100% !important;
  }

  .app-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      z-index: 1000;
  }
  .app-header .back-btn {
      position: absolute;
      left: 16px;
      font-size: 20px;
      color: #333;
      text-decoration: none;
  }
  .app-header .title {
      font-size: 17px;
      font-weight: 600;
      color: #000;
  }

  .poster-wrapper {
      width: 100%;
      background: #fff;
      animation: fadeInUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
  }
  @keyframes fadeInUp {
      to {
          opacity: 1;
          transform: translateY(0);
      }
  }
  .poster-wrapper img {
      width: 100%;
      display: block;
  }

  .bottom-action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #ffffff;
      padding: 12px 20px 20px;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
      display: flex;
      justify-content: center;
      z-index: 1000;
  }
  .bottom-action-bar .btn-primary-action {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(135deg, #1D9E75 0%, #157b5b 100%);
      color: white;
      font-size: 17px;
      font-weight: 600;
      border-radius: 100px;
      padding: 14px 0;
      text-align: center;
      text-decoration: none;
      letter-spacing: 1px;
      transition: all 0.2s;
      border: none;
  }
  .bottom-action-bar .btn-primary-action:hover {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(29, 158, 117, 0.3);
  }
</style>

<div class="app-header">
  <a href="{{ url_for('index') }}" class="back-btn"><i class="bi bi-chevron-left"></i></a>
  <span class="title">护工招募计划</span>
</div>

<div class="container-fluid p-0">
  <div class="poster-wrapper">
    <img src="{{ url_for('static', filename='images/worker_recruit_poster.png') }}" alt="护理智联护工招募海报">
  </div>
</div>

<div class="bottom-action-bar">
  <a href="{{ url_for('register') }}" class="btn-primary-action">立即入驻 开始接单</a>
</div>
{% endblock %}
